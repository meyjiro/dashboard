<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#0bb7ae">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-512.png">
<title>Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f8fa;--bg2:#ffffff;--bg3:#eef1f6;
  --text:#1a1a2e;--text2:#6b7280;--accent:#0bb7ae;--accent-light:#e0f7f6;
  --card:#ffffff;--border:#e5e7eb;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;font-size:16px;background:var(--bg);color:var(--text);overflow:hidden;-webkit-tap-highlight-color:transparent}
input,textarea,button,select{font-size:16px;font-family:inherit}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;background:var(--bg2);border-bottom:1px solid var(--border)}
.top-bar h1{font-size:17px;font-weight:700;color:var(--text)}
.refresh-btn{background:none;border:none;cursor:pointer;padding:8px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.refresh-btn svg{width:22px;height:22px;fill:currentColor;transition:transform .3s}
.refresh-btn.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.tab-content{flex:1;overflow-y:auto;padding:12px 14px calc(70px + var(--safe-bottom) + 16px);-webkit-overflow-scrolling:touch}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--bg2);border-top:1px solid var(--border);padding:0 0 calc(var(--safe-bottom) + 8px);z-index:100}
.nav-btn{flex:1;padding:14px 0 10px;text-align:center;color:var(--text2);background:none;border:none;cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent;min-height:56px}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{display:block;margin:0 auto 4px;width:24px;height:24px;fill:currentColor}
.nav-btn span{font-size:11px;font-weight:600}

/* Auth Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--bg2);border-radius:16px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h2{margin-bottom:8px;font-size:18px;color:var(--text)}
.modal p{font-size:13px;color:var(--text2);margin-bottom:16px}
.modal input{width:100%;padding:14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);margin-bottom:14px}
.modal .btn{width:100%}
.hidden{display:none!important}

/* Buttons */
.btn{padding:12px 20px;border:none;border-radius:10px;cursor:pointer;font-weight:600;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#0aa69e}
.btn-danger{background:#ef4444;color:#fff}
.btn-sm{padding:8px 14px;font-size:14px}
.btn-ghost{background:transparent;color:var(--text2);padding:6px 10px;font-size:18px}

/* Cards */
.card{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card .tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:700;margin-right:6px;color:#fff}
.card .date{color:var(--text2);font-size:13px;margin-right:8px;font-weight:500}
.card .title{font-size:15px;line-height:1.5;color:var(--text)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.card .delete-btn{background:none;border:none;color:#ef4444;cursor:pointer;font-size:20px;padding:4px 8px;opacity:.5;transition:opacity .15s}
.card .delete-btn:active{opacity:1}

/* Calendar */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-header h2{font-size:18px;font-weight:700;color:var(--text)}
.cal-nav{background:none;border:none;color:var(--accent);font-size:24px;cursor:pointer;padding:8px 14px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-label{text-align:center;font-size:12px;color:var(--text2);padding:6px 0;font-weight:600}
.cal-day-label:first-child{color:#ef4444}
.cal-day-label:last-child{color:#3b82f6}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:6px 2px;border-radius:10px;cursor:pointer;transition:background .12s;position:relative;min-height:48px}
.cal-cell:active{background:var(--accent-light)}
.cal-cell.today{background:var(--accent-light);border:2px solid var(--accent)}
.cal-cell.other-month{opacity:.25}
.cal-cell .day-num{font-size:14px;font-weight:600;margin-bottom:3px}
.cal-dots{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;max-width:100%}
.cal-dots .dot{width:6px;height:6px;border-radius:50%}

/* Day Detail Modal */
.day-modal{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.day-modal-content{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;padding-bottom:calc(var(--safe-bottom) + 12px)}
.day-modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
.day-modal-header h3{font-size:17px;font-weight:700}
.day-modal-body{flex:1;overflow-y:auto;padding:12px 16px}
.day-modal-footer{padding:12px 16px;border-top:1px solid var(--border)}
.day-add-form{display:flex;gap:8px}
.day-add-form input{flex:1;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text)}
.day-add-form select{padding:12px 8px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);min-width:70px}

/* Memo */
.memo-form{margin-bottom:16px}
.memo-form textarea{width:100%;min-height:100px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--text);resize:vertical;margin-bottom:10px}
.memo-form .btn{float:right}
.memo-card{white-space:pre-wrap;word-break:break-word}
.memo-card .memo-time{font-size:12px;color:var(--text2);font-weight:500}

/* Task Form */
.task-add-form{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.task-add-form input{flex:1;min-width:140px;padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text)}
.task-add-form select{padding:12px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text)}

/* Loading */
.spinner{text-align:center;padding:40px;color:var(--text2)}
.spinner::after{content:'';display:inline-block;width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-left:8px}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.error{background:#ef4444}
.toast.show{opacity:1}

/* Mebius surgery marker */
.cal-cell .mebius-bar{width:80%;height:4px;border-radius:2px;background:linear-gradient(90deg,#9b59b6,#e040fb);margin-top:1px}
.mebius-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:700;color:#fff;background:linear-gradient(135deg,#9b59b6,#e040fb)}
.mebius-card{border-left:4px solid #9b59b6}

/* Empty state */
.empty{color:var(--text2);text-align:center;padding:32px 16px;font-size:14px}

/* Task completion */
.check-btn{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;padding:0;line-height:1}
.check-btn.done{background:var(--accent);border-color:var(--accent)}
.card.done .title{text-decoration:line-through;color:var(--text2)}
.cal-dots .dot.done{opacity:.28}
.done-section-header{font-size:12px;font-weight:700;color:var(--text2);margin:20px 4px 10px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.done-section-header .chevron{transition:transform .15s}
.done-section-header.collapsed .chevron{transform:rotate(-90deg)}

/* Memo day grouping */
.memo-day-header{font-size:12px;font-weight:700;color:var(--text2);margin:16px 4px 8px;letter-spacing:.02em}
.memo-day-header:first-child{margin-top:2px}
.memo-form .memo-hint{font-size:11px;color:var(--text2);float:left;padding-top:14px}

/* Links (launcher tiles) */
.link-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-top:4px}
.link-tile{display:flex;flex-direction:column;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;text-decoration:none;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.04);transition:transform .12s}
.link-tile:active{transform:scale(.96)}
.link-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px}
.link-label{font-size:15px;font-weight:700;line-height:1.2}
.link-sub{font-size:12px;color:var(--text2);margin-top:-5px}
</style>
</head>
<body>
<div id="app">
  <!-- Top Bar -->
  <div class="top-bar">
    <h1>Dashboard</h1>
    <div style="display:flex;align-items:center;gap:2px">
      <button class="refresh-btn" id="settings-btn" title="設定">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
      <button class="refresh-btn" id="refresh-btn" title="更新">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
    </div>
  </div>

  <div class="tab-content">
    <!-- Calendar Tab -->
    <div id="tab-calendar" class="tab-panel active">
      <div class="cal-header">
        <button class="cal-nav" id="cal-prev">&lsaquo;</button>
        <h2 id="cal-title"></h2>
        <button class="cal-nav" id="cal-next">&rsaquo;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- Memo Tab -->
    <div id="tab-memo" class="tab-panel">
      <div class="memo-form">
        <textarea id="memo-input" placeholder="ふと思いついたこと・考えごとを書き留める…"></textarea>
        <span class="memo-hint">⌘/Ctrl + Enter で送信・書きかけは自動保存</span>
        <button class="btn btn-primary" id="memo-send">送信</button>
        <div style="clear:both"></div>
      </div>
      <div id="memo-feed"></div>
    </div>

    <!-- Tasks Tab -->
    <div id="tab-tasks" class="tab-panel">
      <div class="task-add-form" id="task-add-form">
        <input type="text" id="task-input" placeholder="タスクを追加 (例: 07/15 内容)">
        <select id="task-tag-select">
          <option value="">タグなし</option>
        </select>
        <button class="btn btn-primary btn-sm" id="task-send">追加</button>
      </div>
      <div id="task-list"></div>
    </div>

    <!-- Links Tab -->
    <div id="tab-links" class="tab-panel">
      <div class="link-grid" id="link-grid"></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="calendar">
      <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
      <span>カレンダー</span>
    </button>
    <button class="nav-btn" data-tab="memo">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      <span>メモ</span>
    </button>
    <button class="nav-btn" data-tab="tasks">
      <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
      <span>タスク</span>
    </button>
    <button class="nav-btn" data-tab="links">
      <svg viewBox="0 0 24 24"><path d="M4 4h6v6H4V4zm10 0h6v6h-6V4zM4 14h6v6H4v-6zm10 0h6v6h-6v-6z"/></svg>
      <span>リンク</span>
    </button>
  </nav>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <h2>GitHub Token を入力</h2>
    <p>Issue の読み書きに必要です。一度入力すれば記憶されます。</p>
    <input type="password" id="pat-input" placeholder="ghp_ or gho_...">
    <button class="btn btn-primary" id="pat-save">保存</button>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay hidden" id="settings-modal">
  <div class="modal">
    <h2>設定</h2>
    <p>メビウスの施術日程をカレンダーに表示するためのトークン。一度入力すれば端末に記憶されます。</p>
    <input type="password" id="mebius-token-input" placeholder="mbs_cal_...">
    <button class="btn btn-primary" id="mebius-token-save" style="width:100%;margin-bottom:16px">保存</button>
    <p style="font-size:12px">GitHubトークンを入れ直す場合:</p>
    <button class="btn btn-danger btn-sm" id="reset-pat" style="width:100%">GitHubトークンを再設定</button>
    <button class="btn btn-ghost" id="settings-close" style="width:100%;margin-top:10px">閉じる</button>
  </div>
</div>

<!-- Day Detail Modal -->
<div class="day-modal hidden" id="day-modal">
  <div class="day-modal-content">
    <div class="day-modal-header">
      <h3 id="day-modal-title"></h3>
      <button class="btn-ghost" id="day-modal-close">✕</button>
    </div>
    <div class="day-modal-body" id="day-modal-body"></div>
    <div class="day-modal-footer">
      <div class="day-add-form">
        <select id="day-tag-select"></select>
        <input type="text" id="day-task-input" placeholder="タスクを追加...">
        <button class="btn btn-primary btn-sm" id="day-task-add">追加</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Tag color map ──
const TAG_COLORS = {
  B1:'#ff69b4',B2:'#9b59b6',B3:'#e74c3c',B4:'#2ecc71',B5:'#3498db',
  B6:'#e67e22',B7:'#f1c40f',B8:'#00bcd4',B9:'#95a5a6',B10:'#8d6e63',
  B11:'#009688'
};
const TAG_NAMES = {
  B1:'ガチレズ',B2:'メビウス',B3:'裁判法務',B4:'自己管理',B5:'学習',
  B6:'個人案件',B7:'投資',B8:'出張旅行',B9:'契約管理',B10:'インフラ',B11:'不動産'
};
const DEFAULT_COLOR = '#bdc3c7';
const REPO = 'meyjiro/claude-context';

// ── リンクランチャー（ここに追記すればタイルが増える）──
const LINKS = [
  { icon:'🔮', label:'メビウス管理', sub:'相談・顧客対応', url:'https://mebiusmagic.com/mebius_admin/admin.php', bg:'#f0e6fa' },
  { icon:'✈️', label:'旅行プラン',   sub:'2026年7月 日本', url:'https://mebiusmagic.com/mebius_admin/trip_202507.html', bg:'#e0f7fa' },
  { icon:'💰', label:'売上管理',     sub:'revenue',        url:'https://mebiusmagic.com/mebius_admin/revenue.php', bg:'#fdf3d7' },
  { icon:'👥', label:'顧客一覧',     sub:'clients',        url:'https://mebiusmagic.com/mebius_admin/clients.php', bg:'#e6f2fd' },
];

// ── State ──
let pat = localStorage.getItem('gh_pat') || '';
let tasks = [];
let memos = [];
let calYear, calMonth;
let selectedDate = null;
let mebiusEvents = []; // surgery schedule from Mebius DB
let isLoading = false;
const MEBIUS_API = 'https://mebiusmagic.com/mebius_admin/api_calendar.php';
// トークンはコードに埋め込まず、端末に保存（設定画面から入力）
let mebiusToken = localStorage.getItem('mebius_token') || '';

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();

  if (pat) {
    document.getElementById('auth-modal').classList.add('hidden');
    loadAll();
  }
  setupEvents();
  populateTagSelects();
  renderLinks();
});

// ── Render Links ──
function renderLinks() {
  document.getElementById('link-grid').innerHTML = LINKS.map(l => `
    <a class="link-tile" href="${l.url}" target="_blank" rel="noopener">
      <span class="link-icon" style="background:${l.bg}">${l.icon}</span>
      <span class="link-label">${l.label}</span>
      <span class="link-sub">${l.sub}</span>
    </a>`).join('');
}

function populateTagSelects() {
  const html = '<option value="">タグなし</option>' +
    Object.keys(TAG_COLORS).map(t => `<option value="${t}">[${t}] ${TAG_NAMES[t]}</option>`).join('');
  document.getElementById('task-tag-select').innerHTML = html;
  document.getElementById('day-tag-select').innerHTML = html;
}

// ── Events ──
function setupEvents() {
  document.getElementById('pat-save').addEventListener('click', () => {
    pat = document.getElementById('pat-input').value.trim();
    if (!pat) return;
    localStorage.setItem('gh_pat', pat);
    document.getElementById('auth-modal').classList.add('hidden');
    loadAll();
  });

  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  document.getElementById('cal-prev').addEventListener('click', () => { calMonth--; if(calMonth<0){calMonth=11;calYear--} renderCalendar(); });
  document.getElementById('cal-next').addEventListener('click', () => { calMonth++; if(calMonth>11){calMonth=0;calYear++} renderCalendar(); });

  document.getElementById('memo-send').addEventListener('click', sendMemo);
  const memoInput = document.getElementById('memo-input');
  memoInput.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') sendMemo();
  });
  // 下書き自動保存（書きかけを取りこぼさない）
  memoInput.addEventListener('input', () => localStorage.setItem('memo_draft', memoInput.value));
  const draft = localStorage.getItem('memo_draft');
  if (draft) memoInput.value = draft;

  document.getElementById('task-send').addEventListener('click', sendTask);
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendTask();
  });

  document.getElementById('day-modal-close').addEventListener('click', closeDayModal);
  document.getElementById('day-modal').addEventListener('click', e => { if(e.target.id==='day-modal') closeDayModal(); });
  document.getElementById('day-task-add').addEventListener('click', addDayTask);
  document.getElementById('day-task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addDayTask();
  });

  // Refresh button
  document.getElementById('refresh-btn').addEventListener('click', () => {
    if (!isLoading) loadAll();
  });

  // Settings
  document.getElementById('settings-btn').addEventListener('click', () => {
    document.getElementById('mebius-token-input').value = mebiusToken;
    document.getElementById('settings-modal').classList.remove('hidden');
  });
  document.getElementById('settings-close').addEventListener('click', () => {
    document.getElementById('settings-modal').classList.add('hidden');
  });
  document.getElementById('settings-modal').addEventListener('click', e => {
    if (e.target.id === 'settings-modal') e.currentTarget.classList.add('hidden');
  });
  document.getElementById('mebius-token-save').addEventListener('click', () => {
    mebiusToken = document.getElementById('mebius-token-input').value.trim();
    localStorage.setItem('mebius_token', mebiusToken);
    document.getElementById('settings-modal').classList.add('hidden');
    toast('保存しました');
    loadMebius().then(renderCalendar);
  });
  document.getElementById('reset-pat').addEventListener('click', () => {
    localStorage.removeItem('gh_pat');
    pat = '';
    document.getElementById('settings-modal').classList.add('hidden');
    document.getElementById('auth-modal').classList.remove('hidden');
  });
}

// ── API ──
async function api(path, method='GET', body=null) {
  const opts = {
    method,
    headers: {
      'Authorization': 'token ' + pat,
      'Accept': 'application/vnd.github.v3+json'
    }
  };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch('https://api.github.com' + path, opts);
  if (res.status === 204) return null;
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`API ${res.status}: ${err}`);
  }
  return res.json();
}

async function fetchAllComments(issueNum) {
  let page = 1, all = [];
  while (true) {
    const data = await api(`/repos/${REPO}/issues/${issueNum}/comments?per_page=100&page=${page}`);
    all = all.concat(data);
    if (data.length < 100) break;
    page++;
  }
  return all;
}

// ── Load ──
async function loadAll() {
  if (isLoading) return;
  isLoading = true;
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  try {
    await Promise.all([loadTasks(), loadMemos(), loadMebius()]);
  } catch (e) {
    if (e.message.includes('401')) {
      localStorage.removeItem('gh_pat');
      pat = '';
      document.getElementById('auth-modal').classList.remove('hidden');
      toast('認証エラー。トークンを再入力してください', true);
    } else {
      toast('読み込みエラー: ' + e.message, true);
    }
  }
  btn.classList.remove('spinning');
  isLoading = false;
}

async function loadTasks() {
  const el = document.getElementById('task-list');
  el.innerHTML = '<div class="spinner">読み込み中</div>';
  const comments = await fetchAllComments(1);
  tasks = comments.map(c => parseTask(c));
  renderCalendar();
  renderTaskList();
}

async function loadMemos() {
  const el = document.getElementById('memo-feed');
  el.innerHTML = '<div class="spinner">読み込み中</div>';
  const comments = await fetchAllComments(2);
  memos = comments.map(c => ({ id: c.id, body: c.body, created: c.created_at }));
  renderMemos();
}

// ── Load Mebius ──
async function loadMebius() {
  if (!mebiusToken) { mebiusEvents = []; return; } // 未設定なら施術日程はスキップ
  try {
    const res = await fetch(MEBIUS_API, {
      headers: { 'X-Api-Token': mebiusToken }
    });
    if (!res.ok) throw new Error('Mebius API ' + res.status);
    const data = await res.json();
    mebiusEvents = (data.events || []).map(e => ({
      id: e.id,
      name: e.name || '',
      start: e.start,
      end: e.end,
      nights: e.nights,
      completed: e.completed,
      phase: e.phase
    }));
    renderCalendar();
  } catch (e) {
    // Mebius API failure is non-fatal
    console.warn('Mebius load failed:', e.message);
  }
}

// ── Parse ──
function parseTask(comment) {
  const raw = comment.body.trim();
  let tag = null, month = null, day = null, time = null, done = false, title = raw;

  const doneMatch = title.match(/^\[x\]\s*/i);
  if (doneMatch) {
    done = true;
    title = title.slice(doneMatch[0].length);
  }

  const tagMatch = title.match(/^\[([Bb]\d{1,2})\]\s*/);
  if (tagMatch) {
    tag = tagMatch[1].toUpperCase();
    title = title.slice(tagMatch[0].length);
  }

  const dateMatch = title.match(/^(\d{1,2})\/(\d{1,2})\s*/);
  if (dateMatch) {
    month = parseInt(dateMatch[1], 10);
    day = parseInt(dateMatch[2], 10);
    title = title.slice(dateMatch[0].length);
  }

  const timeMatch = title.match(/^(\d{1,2}:\d{2})\s*/);
  if (timeMatch) {
    time = timeMatch[1];
    title = title.slice(timeMatch[0].length);
  }

  title = title.trim();

  return { id: comment.id, raw, tag, month, day, time, title, done,
    color: tag ? (TAG_COLORS[tag] || DEFAULT_COLOR) : DEFAULT_COLOR };
}

// ── Render Calendar ──
function renderCalendar() {
  const now = new Date();
  const todayY = now.getFullYear(), todayM = now.getMonth(), todayD = now.getDate();

  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent = `${calYear}年 ${monthNames[calMonth]}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  ['日','月','火','水','木','金','土'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();

  const taskMap = {};
  const mebiusMap = {};
  const displayMonth = calMonth + 1;
  tasks.forEach(t => {
    if (t.month === displayMonth && t.day) {
      if (!taskMap[t.day]) taskMap[t.day] = [];
      taskMap[t.day].push(t);
    }
  });

  // Map Mebius completion dates only (surgery_date_last)
  mebiusEvents.forEach(ev => {
    const endDate = new Date((ev.end || ev.start) + 'T00:00:00');
    if (endDate.getFullYear() === calYear && endDate.getMonth() === calMonth) {
      const day = endDate.getDate();
      if (!mebiusMap[day]) mebiusMap[day] = [];
      mebiusMap[day].push(ev);
    }
  });

  for (let i = firstDay - 1; i >= 0; i--) {
    grid.appendChild(createCalCell(prevDays - i, true));
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = calYear === todayY && calMonth === todayM && d === todayD;
    const cell = createCalCell(d, false, isToday, taskMap[d] || [], mebiusMap[d] || []);
    cell.addEventListener('click', () => openDayModal(d));
    grid.appendChild(cell);
  }

  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    grid.appendChild(createCalCell(i, true));
  }
}

function createCalCell(day, otherMonth, isToday=false, dayTasks=[], dayMebius=[]) {
  const cell = document.createElement('div');
  cell.className = 'cal-cell' + (otherMonth ? ' other-month' : '') + (isToday ? ' today' : '');
  cell.innerHTML = `<span class="day-num">${day}</span>`;
  if (dayMebius.length > 0) {
    const bar = document.createElement('div');
    bar.className = 'mebius-bar';
    cell.appendChild(bar);
  }
  if (dayTasks.length > 0) {
    const dots = document.createElement('div');
    dots.className = 'cal-dots';
    dayTasks.slice(0, 5).forEach(t => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (t.done ? ' done' : '');
      dot.style.background = t.color;
      dots.appendChild(dot);
    });
    cell.appendChild(dots);
  }
  return cell;
}

// ── Day Modal ──
function openDayModal(day) {
  selectedDate = day;
  const displayMonth = calMonth + 1;
  document.getElementById('day-modal-title').textContent =
    `${calYear}/${String(displayMonth).padStart(2,'0')}/${String(day).padStart(2,'0')}`;

  const body = document.getElementById('day-modal-body');
  const dayTasks = tasks.filter(t => t.month === displayMonth && t.day === day);

  // Find Mebius events where this day is the completion date (end date only)
  const dateStr = `${calYear}-${String(displayMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const dayMebius = mebiusEvents.filter(ev => {
    return dateStr === (ev.end || ev.start);
  });

  let html = '';

  // Mebius completion dates (prominent)
  if (dayMebius.length > 0) {
    html += dayMebius.map(ev => {
      const startMM = ev.start ? ev.start.slice(5,7).replace(/^0/,'') : '';
      const startDD = ev.start ? ev.start.slice(8,10).replace(/^0/,'') : '';
      const endMM = ev.end ? ev.end.slice(5,7).replace(/^0/,'') : '';
      const endDD = ev.end ? ev.end.slice(8,10).replace(/^0/,'') : '';
      const range = ev.start && ev.end ? `${startMM}/${startDD} 〜 ${endMM}/${endDD}` : '';
      return `
      <div class="card mebius-card">
        <div class="card-header">
          <div>
            <span class="mebius-tag">メビウス</span>
            <span class="date">${ev.completed ? '完了済' : '完了予定'}</span>
          </div>
        </div>
        <div class="title">${escHtml(ev.name || '名前なし')}　${range}（${ev.nights}夜）</div>
      </div>`;
    }).join('');
  }

  const activeDay = dayTasks.filter(t => !t.done);
  const doneDay = dayTasks.filter(t => t.done);

  if (dayTasks.length === 0 && dayMebius.length === 0) {
    body.innerHTML = '<p class="empty">タスクなし</p>';
  } else {
    body.innerHTML = html
      + activeDay.map(taskCardHtml).join('')
      + (doneDay.length ? `<div class="done-section-header">完了済み (${doneDay.length})</div>` + doneDay.map(taskCardHtml).join('') : '');
  }

  document.getElementById('day-task-input').value = '';
  document.getElementById('day-modal').classList.remove('hidden');
}

function closeDayModal() {
  document.getElementById('day-modal').classList.add('hidden');
  selectedDate = null;
}

async function addDayTask() {
  const input = document.getElementById('day-task-input');
  const title = input.value.trim();
  if (!title || selectedDate === null) return;

  const tag = document.getElementById('day-tag-select').value;
  const mm = String(calMonth + 1).padStart(2, '0');
  const dd = String(selectedDate).padStart(2, '0');
  const body = (tag ? `[${tag}] ` : '') + `${mm}/${dd}  ${title}`;

  input.disabled = true;
  try {
    await api(`/repos/${REPO}/issues/1/comments`, 'POST', { body });
    toast('追加しました');
    await loadTasks();
    openDayModal(selectedDate);
  } catch (e) {
    toast('エラー: ' + e.message, true);
  }
  input.disabled = false;
  input.value = '';
}

// ── Task card (shared by list & day modal) ──
function taskCardHtml(t) {
  return `
    <div class="card task-card${t.done ? ' done' : ''}">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:8px;min-width:0">
          <button class="check-btn${t.done ? ' done' : ''}" onclick="toggleTaskDone(${t.id}, ${t.done ? 'false' : 'true'})" title="${t.done ? '未完了に戻す' : '完了にする'}">${t.done ? '✓' : ''}</button>
          <div>
            ${t.tag ? `<span class="tag" style="background:${t.color}">${t.tag}</span>` : ''}
            ${t.month ? `<span class="date">${t.month}/${t.day}</span>` : ''}
            ${t.time ? `<span class="date">${t.time}</span>` : ''}
          </div>
        </div>
        <button class="delete-btn" onclick="deleteTask(${t.id})" title="削除">&times;</button>
      </div>
      <div class="title">${escHtml(t.title)}</div>
    </div>`;
}

// ── Render Task List ──
function renderTaskList() {
  const el = document.getElementById('task-list');
  const sorted = [...tasks].sort((a, b) => {
    if (a.month && !b.month) return -1;
    if (!a.month && b.month) return 1;
    if (a.month && b.month) {
      if (a.month !== b.month) return a.month - b.month;
      return (a.day || 0) - (b.day || 0);
    }
    return 0;
  });

  const active = sorted.filter(t => !t.done);
  const done = sorted.filter(t => t.done);

  if (sorted.length === 0) {
    el.innerHTML = '<p class="empty">タスクなし</p>';
    return;
  }

  let html = active.length ? active.map(taskCardHtml).join('') : '<p class="empty">未完了タスクなし</p>';
  if (done.length) {
    html += `<div class="done-section-header" onclick="toggleDoneSection(this)"><span class="chevron">▾</span> 完了済み (${done.length})</div>`
          + `<div class="done-list">` + done.map(taskCardHtml).join('') + `</div>`;
  }
  el.innerHTML = html;
}

function toggleDoneSection(header) {
  header.classList.toggle('collapsed');
  const list = header.nextElementSibling;
  if (list) list.style.display = header.classList.contains('collapsed') ? 'none' : 'block';
}

// ── Send Task ──
async function sendTask() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) return;

  const tag = document.getElementById('task-tag-select').value;
  const body = (tag ? `[${tag}] ` : '') + text;

  input.disabled = true;
  try {
    await api(`/repos/${REPO}/issues/1/comments`, 'POST', { body });
    toast('追加しました');
    input.value = '';
    await loadTasks();
  } catch (e) {
    toast('エラー: ' + e.message, true);
  }
  input.disabled = false;
}

// ── Complete / Uncomplete Task (保存: 削除せずIssueコメントを編集) ──
async function toggleTaskDone(id, makeDone) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const stripped = t.raw.replace(/^\[x\]\s*/i, '');
  const newBody = makeDone ? '[x] ' + stripped : stripped;
  try {
    await api(`/repos/${REPO}/issues/comments/${id}`, 'PATCH', { body: newBody });
    toast(makeDone ? '完了にしました' : '未完了に戻しました');
    await loadTasks();
    if (selectedDate !== null) openDayModal(selectedDate);
  } catch (e) {
    toast('エラー: ' + e.message, true);
  }
}

// ── Delete Task (完全削除) ──
async function deleteTask(id) {
  if (!confirm('このタスクを完全に削除しますか？（完了にするだけなら○ボタン）')) return;
  try {
    await api(`/repos/${REPO}/issues/comments/${id}`, 'DELETE');
    toast('削除しました');
    await loadTasks();
    if (selectedDate !== null) openDayModal(selectedDate);
  } catch (e) {
    toast('エラー: ' + e.message, true);
  }
}

// ── Render Memos (日付ごとにグループ化した思考ログ) ──
function renderMemos() {
  const el = document.getElementById('memo-feed');
  if (memos.length === 0) {
    el.innerHTML = '<p class="empty">まだメモはありません。<br>ふと思いついたこと・考えごとを書き留めておけます。</p>';
    return;
  }
  const sorted = [...memos].reverse(); // 新しい順
  let html = '', lastDay = '';
  sorted.forEach(m => {
    const d = new Date(m.created);
    const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if (key !== lastDay) {
      html += `<div class="memo-day-header">${dayLabel(d)}</div>`;
      lastDay = key;
    }
    const hh = d.getHours(), mi = String(d.getMinutes()).padStart(2, '0');
    html += `
      <div class="card memo-card">
        <div class="card-header">
          <span class="memo-time">${hh}:${mi}</span>
          <button class="delete-btn" onclick="deleteMemo(${m.id})" title="削除">&times;</button>
        </div>
        <div class="title">${escHtml(m.body)}</div>
      </div>`;
  });
  el.innerHTML = html;
}

function dayLabel(d) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const that = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = Math.round((today - that) / 86400000);
  const wd = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
  const md = `${d.getMonth() + 1}月${d.getDate()}日(${wd})`;
  if (diff === 0) return `今日 ・ ${md}`;
  if (diff === 1) return `昨日 ・ ${md}`;
  return `${d.getFullYear()}年${md}`;
}

// ── Send Memo ──
async function sendMemo() {
  const input = document.getElementById('memo-input');
  const text = input.value.trim();
  if (!text) return;

  input.disabled = true;
  document.getElementById('memo-send').disabled = true;
  try {
    await api(`/repos/${REPO}/issues/2/comments`, 'POST', { body: text });
    toast('送信しました');
    input.value = '';
    localStorage.removeItem('memo_draft');
    await loadMemos();
  } catch (e) {
    toast('エラー: ' + e.message, true);
  }
  input.disabled = false;
  document.getElementById('memo-send').disabled = false;
}

// ── Delete Memo ──
async function deleteMemo(id) {
  if (!confirm('このメモを削除しますか？')) return;
  try {
    await api(`/repos/${REPO}/issues/comments/${id}`, 'DELETE');
    toast('削除しました');
    await loadMemos();
  } catch (e) {
    toast('エラー: ' + e.message, true);
  }
}

// ── Helpers ──
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatTime(iso) {
  const d = new Date(iso);
  const mm = d.getMonth()+1, dd = d.getDate(), hh = d.getHours(), mi = String(d.getMinutes()).padStart(2,'0');
  return `${mm}/${dd} ${hh}:${mi}`;
}

function toast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.classList.remove('show'), 2500);
}
